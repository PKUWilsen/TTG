# TTG refinement phase configuration.

deterministic: false

data:
  data_root: /path/to/radiomap
  channel_num: 5750
  img_height: 256
  img_width: 256
  num_samples_sparse: 200
  train_indices_range: [0, 1576]
  val_indices_range: [1300, 1576]
  test_indices_range: [1676, 1776]
  gen_indices_range: [0, 1200]
  num_workers: 4
  prefetch_factor: 4
  rss_offset: 95.0
  rss_scale: 66.0
  invalid_threshold: -1.0
  invalid_fill_value: -95.0
  max_stations: 3

coarse_model:
  name: AttUNet
  in_channels: 2
  out_channels: 1
  channel_list: [128, 128, 256, 256, 512, 512]
  conv_transpose: true

model:
  name: UNetRefine
  channels: [192, 320, 512, 640, 640, 640]
  with_attns: [false, false, true, true, true, true]
  norm_type: gn
  activation_type: silu
  pe_dim: 128
  # Total input channels to the first convolution after concatenating x_t and condition.
  # x_t: 1 channel; condition: building map + enhanced sparse map = 2 channels.
  in_channels: 3
  out_channels: 1

diffusion:
  ddpm_steps: 1000
  beta_start: 1.0e-4
  beta_end: 0.02

sparse_enhancement:
  total_points: 300

guidance:
  # These stage thresholds refer to the three-stage DDIM guidance inside the Refinement Phase.
  core_threshold_01: 0.9
  stage1_end_step: 800
  stage2_end_step: 200

training:
  batch_size: 8
  num_epochs: 800
  lr: 1.0e-6
  weight_decay: 0.0
  scheduler_step_size: 200
  scheduler_gamma: 0.5
